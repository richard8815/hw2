name: CI/CD — Build & Push to Docker Hub

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/face-personality-api

jobs:
  # ────────────────────────────────────────────
  # Job 1: 코드 린트 & 기본 검증
  # ────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check app/

  # ────────────────────────────────────────────
  # Job 2: Docker 빌드 & Docker Hub Push
  # ────────────────────────────────────────────
  docker:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'          # PR에서는 빌드만, push에서만 배포

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Buildx 설정 (멀티플랫폼 & 캐시 지원) ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker Hub 로그인 ──
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 태그 전략: latest + git sha + semver ──
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 빌드 & 푸시 (레이어 캐시 활용) ──
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
